# === Project Manager ===
# skills:
#   scrum: 0.15
#   agile: 0.15
#   jira: 0.12
#   project management: 0.15
#   stakeholder management: 0.10
#   pmp: 0.08
#   kanban: 0.08
#   communication: 0.05

# Customize your skills below:
skills:
  skill1: 0.20
  skill2: 0.15
  skill3: 0.10

# Core skills (must have at least 2 for a good match)
core_skills:
  - skill1
  - skill2

# Minimum score to pass matching (0.0-1.0)
# Lower = more jobs, Higher = stricter matching
min_score: 0.15

# ---------------------------------------------------------------------------
# Rules-based scoring (filters/rules.py) — all sections optional.
# Omit any field to fall back to built-in defaults.
# ---------------------------------------------------------------------------
rules:
  # Coarser keywords worth points in the rules engine
  positive_stack:
    # skill: weight
    # python: 0.15

  # Title keywords that indicate a relevant role
  relevant_titles:
    # - devops
    # - backend

  # Max years of experience a job can ask for (0 = disabled, for mid/senior).
  max_years_experience: 0

  # Minimum salary (MXN brutos/mes). Falls back to preferences.min_salary_mxn.
  # min_salary_mxn: 30000

  # Substring exclusions
  hard_exclusions: []

# Company classification — override built-in defaults if needed
companies:
  blacklist: []
  whitelist: []
