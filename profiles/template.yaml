# Profile Template
# Copy this file and customize for a new user
# Example: cp template.yaml sister.yaml

name: Your Name
enabled: false  # Set to true when ready

# Telegram notifications
telegram:
  # Get your chat_id by messaging @userinfobot on Telegram
  chat_id: "YOUR_CHAT_ID_HERE"

# Job preferences
preferences:
  min_salary_mxn: 25000          # Monthly brutos (0 to disable)
  remote_preferred: true
  locations:
    - Mexico
    - CDMX
    - Remote
  
  # Exclude certain employers (optional)
  exclude_companies: []

# Skills with weights (0.0-1.0)
# Higher weight = more important for matching
# Common skills for different roles:

# === Frontend Developer ===
# skills:
#   javascript: 0.20
#   react: 0.20
#   typescript: 0.15
#   css: 0.10
#   html: 0.10
#   next.js: 0.10
#   tailwind: 0.08
#   vue: 0.08
#   angular: 0.05
#   figma: 0.05

# === Backend Developer ===
# skills:
#   python: 0.15
#   java: 0.15
#   node.js: 0.15
#   sql: 0.10
#   postgresql: 0.10
#   mongodb: 0.08
#   rest api: 0.08
#   docker: 0.08
#   microservices: 0.05

# === Data Analyst ===
# skills:
#   excel: 0.15
#   sql: 0.20
#   python: 0.15
#   tableau: 0.15
#   power bi: 0.15
#   data visualization: 0.10
#   statistics: 0.08
#   pandas: 0.08

# === DevOps/SRE ===
# skills:
#   linux: 0.15
#   docker: 0.15
#   kubernetes: 0.15
#   terraform: 0.15
#   aws: 0.15
#   ci/cd: 0.10
#   ansible: 0.08
#   monitoring: 0.05

# === UX/UI Designer ===
# skills:
#   figma: 0.20
#   user research: 0.15
#   wireframing: 0.12
#   prototyping: 0.12
#   design systems: 0.10
#   adobe xd: 0.08
#   sketch: 0.08
#   usability testing: 0.08
